<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Orchestrator Dashboard</title>
  <style>
    :root { --bg: #f5f5f5; --card: #fff; --text: #222; --pass: #d1e7dd; --fail: #f8d7da; --flaky: #fff3cd; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 2rem; }
    .container { max-width: 820px; width: 100%; background: var(--card); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 2rem; }
    h1 { text-align: center; margin-bottom: 2rem; }
    .row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    input { flex: 1; padding: 0.5rem; font-size: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    #tests, #results { margin-top: 1rem; }
    .result-summary { margin: 1.5rem 0 0.5rem 0; font-weight: bold; }
    .test-case { display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0; }
    .badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.85rem; }
    .pass { background: var(--pass); color: #0f5132; }
    .fail { background: var(--fail); color: #721c24; }
    .flaky { background: var(--flaky); color: #856404; }
    .error-message { color: #721c24; font-size: 0.85rem; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Test Orchestrator Dashboard</h1>
    
    <div class="row">
      <input type="text" id="configPath" value="test-orchestrator.config.json">
      <input type="text" id="testsDir" value=".">
      <button id="loadTestsBtn">Load tests</button>
    </div>
    
    <div id="tests"></div>
    
    <div class="row">
      <button id="runBtn">Run</button>
    </div>
    
    <div id="results"></div>
  </div>

  <script>
    document.getElementById('loadTestsBtn').addEventListener('click', async () => {
      const testsDir = document.getElementById('testsDir').value;
      try {
        const res = await fetch(`/api/tests?dir=${encodeURIComponent(testsDir)}`);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        const testsList = document.getElementById('tests');
        testsList.innerHTML = data.files.length ? 
          `<ul>${data.files.map(f => `<li>${f}</li>`).join('')}</ul>` : 
          '<p>No test files found</p>';
      } catch (err) {
        document.getElementById('tests').innerHTML = `<p style="color: red">Error loading tests: ${err.message}</p>`;
      }
    });

    document.getElementById('runBtn').addEventListener('click', async () => {
      const runBtn = document.getElementById('runBtn');
      const resultsArea = document.getElementById('results');
      
      runBtn.disabled = true;
      resultsArea.innerHTML = '';
      
      try {
        const configPath = document.getElementById('configPath').value;
        const testsDir = document.getElementById('testsDir').value;
        
        const res = await fetch('/api/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ configPath, testsDir })
        });
        
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        
        const data = await res.json();
        
        let summary = '';
        switch (data.status) {
          case 'pass': summary = 'PASS'; break;
          case 'fail': summary = 'FAIL'; break;
          case 'flaky': summary = 'FLAKY'; break;
        }
        
        resultsArea.innerHTML = `
          <div class="result-summary">${summary} - ${data.passed} passed, ${data.failed} failed, ${data.flaky} flaky (${data.durationMs}ms)</div>
        `;

        data.results.forEach(result => {
          const row = document.createElement('div');
          row.className = 'test-case';
          
          const badge = document.createElement('span');
          badge.className = `badge ${result.status}`;
          badge.textContent = result.status.toUpperCase();
          
          const name = document.createElement('span');
          name.textContent = result.testCaseName;
          
          const duration = document.createElement('span');
          duration.textContent = `${result.durationMs}ms`;
          
          row.append(badge, name, duration);
          
          if (result.error) {
            const error = document.createElement('div');
            error.className = 'error-message';
            error.textContent = result.error.message;
            row.appendChild(error);
          }
          
          resultsArea.appendChild(row);
        });
      } catch (err) {
        resultsArea.innerHTML = `<div style="color: red">Error: ${err.message}</div>`;
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
