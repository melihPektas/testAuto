<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Test Orchestrator</title>
<style>
  :root {
    /* A blue-biased near-black, so the neutrals belong to the same family as
       the informational blue rather than being inherited grey. */
    --ground: #0b0e14;
    --panel: #131823;
    --well: #0d1119;
    --border: #222a3a;
    --border-soft: #1a2130;
    --text: #e8ecf4;
    --muted: #8794ab;
    /* One warm accent, spent only on the primary action. */
    --primary: #ff6b2c;
    --primary-ink: #1a0a02;
    --pass: #4ade80;
    --fail: #f87171;
    --warn: #fbbf24;
    --info: #93b4e8;
    --violet: #c4b5fd;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--ground);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    padding: 1.5rem 1rem 4rem;
  }
  .wrap { max-width: 1120px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

  /* ---- header ---- */
  .top { display: flex; align-items: center; gap: 0.85rem; padding-bottom: 0.5rem; }
  .mark {
    width: 38px; height: 38px; border-radius: 10px; flex: none;
    background: linear-gradient(150deg, var(--primary), #b7381a);
    display: grid; place-items: center; font-weight: 800; color: var(--primary-ink);
    font-size: 0.95rem; letter-spacing: -0.02em;
  }
  .top h1 { font-size: 1.15rem; margin: 0; letter-spacing: -0.01em; }
  .top .path { color: var(--muted); font-size: 0.78rem; font-family: ui-monospace, monospace; }
  .top .spacer { flex: 1; }
  .pill {
    display: inline-flex; align-items: center; gap: 0.45rem;
    border: 1px solid var(--border); border-radius: 999px;
    padding: 0.35rem 0.8rem; font-size: 0.8rem; font-weight: 600; background: var(--panel);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: none; }
  .pill.pass { color: var(--pass); } .pill.pass .dot { background: var(--pass); }
  .pill.fail { color: var(--fail); } .pill.fail .dot { background: var(--fail); }
  .pill.busy { color: var(--warn); } .pill.busy .dot { background: var(--warn); animation: blink 1s steps(2, start) infinite; }
  @keyframes blink { to { opacity: 0.25; } }
  @media (prefers-reduced-motion: reduce) { .pill.busy .dot { animation: none; } }

  /* ---- panels ---- */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; }
  .panel > header {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--border-soft);
  }
  .panel > header h2 { font-size: 0.95rem; margin: 0; font-weight: 650; }
  .panel > header .tech {
    margin-left: auto; color: var(--muted); font-size: 0.72rem;
    font-family: ui-monospace, monospace; letter-spacing: 0.02em;
  }
  .panel .body { padding: 1.1rem; display: flex; flex-direction: column; gap: 0.9rem; }

  label.lbl {
    display: block; font-size: 0.68rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 0.35rem; font-weight: 600;
  }
  input[type="text"], input[type="url"], select, textarea {
    width: 100%; padding: 0.55rem 0.7rem; border-radius: 9px;
    border: 1px solid var(--border); background: var(--well); color: var(--text);
    font-size: 0.88rem; font-family: inherit;
  }
  input:focus-visible, select:focus-visible, textarea:focus-visible,
  button:focus-visible, summary:focus-visible {
    outline: 2px solid var(--primary); outline-offset: 2px;
  }
  .row { display: flex; gap: 0.8rem; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 130px; }

  /* Segmented control: one choice out of a few, always all visible. */
  .seg { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .seg button {
    display: inline-flex; align-items: center; gap: 0.45rem;
    padding: 0.45rem 0.85rem; border-radius: 999px;
    border: 1px solid var(--border); background: var(--well);
    color: var(--muted); font-size: 0.84rem; cursor: pointer;
  }
  .seg button[aria-pressed="true"] { border-color: var(--primary); color: var(--text); }
  .seg button[aria-pressed="true"] .dot { background: var(--primary); }

  button {
    padding: 0.55rem 1rem; border-radius: 9px; border: 1px solid var(--border);
    background: #1b2231; color: var(--text); font-size: 0.88rem; font-family: inherit; cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: #38455e; }
  button:disabled { opacity: 0.45; cursor: default; }
  button.primary {
    background: var(--primary); border-color: var(--primary); color: var(--primary-ink);
    font-weight: 700; padding: 0.7rem 1rem;
    box-shadow: 0 6px 22px -8px var(--primary);
  }
  button.primary:hover:not(:disabled) { filter: brightness(1.07); }
  .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .toggle { display: inline-flex; align-items: center; gap: 0.45rem; color: var(--muted); font-size: 0.85rem; }
  .toggle input { width: auto; }

  /* ---- stat tiles ---- */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.7rem; }
  @media (max-width: 620px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    background: var(--well); border: 1px solid var(--border-soft);
    border-radius: 10px; padding: 0.8rem; text-align: center;
  }
  .stat .n { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .stat .k { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.2rem; }
  .stat.pass .n { color: var(--pass); }
  .stat.fail .n { color: var(--fail); }
  .stat.flaky .n { color: var(--warn); }

  /* ---- checklist rows ---- */
  .rows { display: flex; flex-direction: column; }
  .rowline {
    display: flex; align-items: center; gap: 0.7rem;
    padding: 0.55rem 0.2rem; border-top: 1px solid var(--border-soft); font-size: 0.88rem;
  }
  .rowline:first-child { border-top: none; }
  .rowline .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rowline .t { color: var(--muted); font-size: 0.78rem; font-variant-numeric: tabular-nums; }
  .tick { width: 1.1rem; text-align: center; font-weight: 700; }
  .tick.pass { color: var(--pass); }
  .tick.fail { color: var(--fail); }
  .tick.flaky { color: var(--warn); }
  .msg { color: var(--fail); font-size: 0.78rem; padding: 0 0 0.45rem 1.8rem; font-family: ui-monospace, monospace; }

  /* ---- triage ---- */
  .verdict {
    display: inline-block; padding: 0.18rem 0.55rem; border-radius: 6px;
    font-size: 0.7rem; font-weight: 700; font-family: ui-monospace, monospace; flex: none;
  }
  .verdict.product-bug { background: #3a1620; color: var(--fail); }
  .verdict.test-bug { background: #33260f; color: var(--warn); }
  .verdict.flaky { background: #33260f; color: var(--warn); }
  .verdict.test-data { background: #2b1f3d; color: var(--violet); }
  .verdict.environment { background: #1b2537; color: var(--info); }
  .tri { display: flex; gap: 0.7rem; padding: 0.8rem 0; border-top: 1px solid var(--border-soft); }
  .tri:first-child { border-top: none; }
  .tri .b { flex: 1; min-width: 0; }
  .tri .who { font-weight: 650; }
  .tri .why { font-size: 0.86rem; }
  .tri .fix { font-size: 0.82rem; color: var(--pass); margin-top: 0.2rem; }
  .ev { font-size: 0.76rem; color: var(--muted); font-family: ui-monospace, monospace; margin-top: 0.3rem; }
  .ev code { color: #cfe0ff; }
  .tri .meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.3rem; }
  .tri .meta.low { color: var(--warn); }
  details.shot { margin-top: 0.45rem; }
  details.shot summary { cursor: pointer; color: var(--info); font-size: 0.76rem; }
  .tri .repair { margin-top: 0.5rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .tri .repair button { padding: 0.35rem 0.7rem; font-size: 0.8rem; }
  .tri .repair .outcome { font-size: 0.8rem; }
  .tri .repair .outcome code { color: #cfe0ff; }
  details.shot img { max-width: 100%; margin-top: 0.4rem; border: 1px solid var(--border); border-radius: 9px; display: block; }

  /* ---- misc ---- */
  #log {
    background: #05070c; border: 1px solid var(--border-soft); border-radius: 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.78rem;
    color: #8fe3ab; padding: 0.75rem; max-height: 230px; overflow: auto; white-space: pre-wrap;
  }
  .chips { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .chip {
    background: var(--well); border: 1px solid var(--border-soft); border-radius: 999px;
    padding: 0.22rem 0.7rem; font-size: 0.76rem; color: var(--muted);
  }
  .chip b { color: var(--text); font-weight: 600; }
  .muted { color: var(--muted); }
  .err { color: var(--fail); font-size: 0.84rem; }
  .ok { color: var(--pass); font-size: 0.84rem; }
  ul.files { list-style: none; margin: 0; padding: 0; max-height: 210px; overflow: auto; }
  ul.files li { border-top: 1px solid var(--border-soft); }
  ul.files li:first-child { border-top: none; }
  ul.files button {
    width: 100%; text-align: left; background: none; border: none; color: var(--info);
    padding: 0.4rem 0.2rem; font-family: ui-monospace, monospace; font-size: 0.8rem; cursor: pointer;
  }
  ul.files button:hover:not(:disabled) { color: var(--text); }
  #editorText { min-height: 240px; resize: vertical; font-family: ui-monospace, monospace; font-size: 0.8rem; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="mark">TO</div>
    <div>
      <h1>Test Orchestrator</h1>
      <div class="path">explore · author · run · triage</div>
    </div>
    <div class="spacer"></div>
    <span class="pill" id="statusPill"><span class="dot"></span><span id="statusText">idle</span></span>
  </div>

  <div class="grid">
    <section class="panel">
      <header>
        <h2>Generate from a URL</h2>
        <span class="tech">llm · playwright</span>
      </header>
      <div class="body">
        <div>
          <label class="lbl" for="siteUrl">Site to test</label>
          <input id="siteUrl" type="url" placeholder="https://example.com/products" />
        </div>

        <div>
          <label class="lbl" for="modeSeg">Mode</label>
          <div class="seg" id="modeSeg" role="group" aria-label="Generation mode">
            <button type="button" data-mode="author" aria-pressed="true"><span class="dot"></span>Scenarios</button>
            <button type="button" data-mode="matrix" aria-pressed="false"><span class="dot"></span>Combination matrix</button>
          </div>
        </div>

        <div class="row" id="authorOpts">
          <div>
            <label class="lbl" for="genPages">Pages</label>
            <select id="genPages"><option>1</option><option selected>2</option><option>3</option><option>5</option></select>
          </div>
          <div>
            <label class="lbl" for="genCount">Scenarios / page</label>
            <select id="genCount"><option>2</option><option selected>3</option><option>5</option></select>
          </div>
        </div>

        <div class="row hidden" id="matrixOpts">
          <div>
            <label class="lbl" for="genLimit">Max cases</label>
            <select id="genLimit"><option>50</option><option>100</option><option selected>500</option></select>
          </div>
        </div>

        <div>
          <label class="lbl" for="genDir">Write into</label>
          <input id="genDir" type="text" value="." />
        </div>

        <button id="genBtn" class="primary">Generate tests</button>
        <div id="genOut" style="font-size:0.82rem"></div>
      </div>
    </section>

    <section class="panel">
      <header>
        <h2>Run</h2>
        <span class="tech">orchestrator engine</span>
      </header>
      <div class="body">
        <div>
          <label class="lbl" for="configPath">Config</label>
          <input id="configPath" type="text" value="test-orchestrator.config.json" />
        </div>
        <div class="row">
          <div>
            <label class="lbl" for="testsDir">Tests directory</label>
            <input id="testsDir" type="text" value="." />
          </div>
          <div>
            <label class="lbl" for="conc">Parallel</label>
            <select id="conc"><option>1</option><option selected>4</option><option>8</option></select>
          </div>
        </div>
        <div class="actions">
          <button id="loadConfigBtn">Load config</button>
          <button id="loadTestsBtn">Load tests</button>
          <label class="toggle"><input type="checkbox" id="triageToggle" checked /> Triage failures</label>
        </div>
        <div class="chips" id="configChips"></div>
        <button id="runBtn" class="primary">Run tests</button>
        <ul class="files" id="fileList"></ul>
      </div>
    </section>
  </div>

  <section class="panel hidden" id="resultsPanel">
    <header><h2>Results</h2><span class="tech" id="resultsTech"></span></header>
    <div class="body">
      <div class="stats" id="stats"></div>
      <div class="rows" id="results"></div>
    </div>
  </section>

  <section class="panel hidden" id="triagePanel">
    <header><h2>Triage</h2><span class="tech" id="triageTech"></span></header>
    <div class="body">
      <div class="chips" id="triageCounts"></div>
      <div id="triage"></div>
    </div>
  </section>

  <section class="panel hidden" id="logPanel">
    <header><h2>Live log</h2><span class="tech">server-sent events</span></header>
    <div class="body"><div id="log"></div></div>
  </section>

  <section class="panel hidden" id="editorPanel">
    <header><h2>Edit test case</h2><span class="tech" id="editorFile"></span></header>
    <div class="body">
      <textarea id="editorText" spellcheck="false"></textarea>
      <div class="actions">
        <button id="saveBtn" class="primary">Save</button>
        <span id="editorStatus"></span>
      </div>
    </div>
  </section>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const esc = (v) =>
    String(v ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]);
  const show = (id, on) => $(id).classList.toggle('hidden', !on);

  const setStatus = (text, kind) => {
    $('statusPill').className = 'pill' + (kind ? ' ' + kind : '');
    $('statusText').textContent = text;
  };

  const log = (line) => {
    show('logPanel', true);
    const el = $('log');
    el.textContent += line + '\n';
    el.scrollTop = el.scrollHeight;
  };

  const cfgPath = () => $('configPath').value.trim() || 'test-orchestrator.config.json';
  const testsDir = () => $('testsDir').value.trim() || '.';

  // ---------- generation mode ----------
  let mode = 'author';
  $('modeSeg').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-mode]');
    if (!btn) return;
    mode = btn.dataset.mode;
    for (const b of $('modeSeg').querySelectorAll('button')) {
      b.setAttribute('aria-pressed', String(b === btn));
    }
    show('authorOpts', mode === 'author');
    show('matrixOpts', mode === 'matrix');
  });

  // ---------- generate from a url ----------
  $('genBtn').addEventListener('click', () => {
    const url = $('siteUrl').value.trim();
    const out = $('genOut');
    if (!/^https?:\/\//.test(url)) {
      out.innerHTML = '<span class="err">Enter a http(s) URL to test.</span>';
      return;
    }
    const dir = $('genDir').value.trim() || '.';
    const btn = $('genBtn');
    btn.disabled = true;
    btn.textContent = 'Generating…';
    out.innerHTML = '';
    setStatus(mode === 'author' ? 'authoring' : 'planning matrix', 'busy');
    log(mode + ': ' + url);

    const qs =
      'url=' + encodeURIComponent(url) +
      '&dir=' + encodeURIComponent(dir) +
      '&configPath=' + encodeURIComponent(cfgPath()) +
      (mode === 'author'
        ? '&pages=' + $('genPages').value + '&count=' + $('genCount').value
        : '&limit=' + $('genLimit').value);

    const src = new EventSource('/api/' + mode + '/stream?' + qs);
    const finish = () => {
      src.close();
      btn.disabled = false;
      btn.textContent = 'Generate tests';
    };

    src.addEventListener('phase', (e) => log('  ' + JSON.parse(e.data).phase + '…'));

    src.addEventListener('page', (e) => {
      const p = JSON.parse(e.data);
      log('  ' + p.url + ' → ' + p.accepted + ' accepted, ' + p.rejected + ' rejected');
    });

    src.addEventListener('done', (e) => {
      const d = JSON.parse(e.data);
      const folder = d.written[0] ? d.written[0].split('/')[0] : null;
      const rejected = Array.isArray(d.rejected) ? d.rejected.length : 0;
      let html = '<span class="ok">Wrote ' + d.written.length + ' test case(s)</span>';
      if (rejected) html += ' <span class="muted">· ' + rejected + ' rejected by validation</span>';
      if (d.plan) {
        const axes = d.plan.axes.map((a) => esc(a.axis) + ' ×' + a.values).join(', ');
        html += '<div class="ev">result selector <code>' + esc(d.plan.resultSelector) + '</code>' +
                (axes ? ' · axes: ' + axes : '') + '</div>';
      }
      html += '<div class="muted" style="margin-top:.35rem">model: ' + esc(d.model) + '</div>';
      out.innerHTML = html;

      if (folder) {
        // Point the runner at what was just produced, so the next click works.
        $('testsDir').value = dir === '.' ? folder : dir + '/' + folder;
        loadTests();
      }
      setStatus(d.written.length + ' generated', 'pass');
      log('generation done.');
      finish();
    });

    src.addEventListener('error', (e) => {
      let msg = 'stream failed';
      try { if (e.data) msg = JSON.parse(e.data).message; } catch (_) {}
      out.innerHTML = '<span class="err">' + esc(msg) + '</span>';
      setStatus('generation failed', 'fail');
      finish();
    });
  });

  // ---------- config & tests ----------
  $('loadConfigBtn').addEventListener('click', async () => {
    const box = $('configChips');
    box.innerHTML = '<span class="chip">loading…</span>';
    try {
      const r = await fetch('/api/config?path=' + encodeURIComponent(cfgPath()));
      const cfg = await r.json();
      if (!r.ok) throw new Error(cfg.error || 'failed');
      box.innerHTML =
        '<span class="chip"><b>' + esc(cfg.name) + '</b></span>' +
        cfg.runners.map((x) => '<span class="chip"><b>' + esc(x.name) + '</b> · ' + esc(x.type) + '</span>').join('');
    } catch (err) {
      box.innerHTML = '<span class="chip err">' + esc(err.message) + '</span>';
    }
  });

  async function loadTests() {
    const list = $('fileList');
    list.innerHTML = '<li><button disabled>loading…</button></li>';
    try {
      const r = await fetch('/api/tests?dir=' + encodeURIComponent(testsDir()));
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'failed');
      list.innerHTML = data.files.length
        ? data.files.map((f) => '<li><button data-file="' + esc(f) + '">' + esc(f) + '</button></li>').join('')
        : '<li><button disabled>no *.test-case.json here</button></li>';
    } catch (err) {
      list.innerHTML = '<li><button disabled class="err">' + esc(err.message) + '</button></li>';
    }
  }
  $('loadTestsBtn').addEventListener('click', loadTests);

  // ---------- run ----------
  $('runBtn').addEventListener('click', () => {
    const btn = $('runBtn');
    btn.disabled = true;
    btn.textContent = 'Running…';
    $('log').textContent = '';
    $('results').innerHTML = '';
    $('stats').innerHTML = '';
    $('triage').innerHTML = '';
    $('triageCounts').innerHTML = '';
    show('resultsPanel', false);
    show('triagePanel', false);
    setStatus('running', 'busy');

    const wantsTriage = $('triageToggle').checked;
    const src = new EventSource(
      '/api/run/stream?configPath=' + encodeURIComponent(cfgPath()) +
      '&testsDir=' + encodeURIComponent(testsDir()) +
      '&concurrency=' + $('conc').value +
      (wantsTriage ? '&triage=1' : ''),
    );
    const finish = () => {
      src.close();
      btn.disabled = false;
      btn.textContent = 'Run tests';
    };

    src.addEventListener('progress', (e) => {
      const ev = JSON.parse(e.data);
      if (ev.type === 'test:end' && ev.result) {
        log('  ' + ev.result.status.toUpperCase() + '  ' + ev.result.testCaseName +
            ' (' + ev.result.durationMs + 'ms)');
      }
    });

    src.addEventListener('summary', (e) => {
      const s = JSON.parse(e.data);
      $('resultsTech').textContent = s.durationMs + 'ms · ' + $('conc').value + ' parallel';
      $('stats').innerHTML =
        '<div class="stat"><div class="n">' + s.total + '</div><div class="k">total</div></div>' +
        '<div class="stat pass"><div class="n">' + s.passed + '</div><div class="k">passed</div></div>' +
        '<div class="stat fail"><div class="n">' + s.failed + '</div><div class="k">failed</div></div>' +
        '<div class="stat flaky"><div class="n">' + s.flaky + '</div><div class="k">flaky</div></div>';
      $('results').innerHTML = s.results.map((r) => {
        const tick = r.status === 'pass' ? '✓' : r.status === 'flaky' ? '~' : '✕';
        const first = r.error && r.error.message ? r.error.message.split('\n')[0] : '';
        return '<div class="rowline"><span class="tick ' + r.status + '">' + tick + '</span>' +
               '<span class="nm">' + esc(r.testCaseName) + '</span>' +
               '<span class="t">' + r.durationMs + 'ms</span></div>' +
               (first ? '<div class="msg">' + esc(first) + '</div>' : '');
      }).join('');
      show('resultsPanel', true);
      setStatus(s.failed ? s.failed + ' failed' : 'all passed', s.failed ? 'fail' : 'pass');
      if (!wantsTriage || s.failed === 0) { log('done.'); finish(); }
    });

    src.addEventListener('triage:start', (e) => {
      const count = JSON.parse(e.data).count;
      show('triagePanel', true);
      $('triageCounts').innerHTML = '<span class="chip">judging ' + count + ' failure(s)…</span>';
      setStatus('triaging', 'busy');
      log('triaging ' + count + ' failure(s)…');
    });

    src.addEventListener('triage', (e) => {
      const t = JSON.parse(e.data);
      const ev = t.evidence || {};
      const bits = [];
      if (typeof ev.targetCount === 'number') bits.push('selector matched <code>' + ev.targetCount + '</code>');
      if (Array.isArray(ev.similarSelectors) && ev.similarSelectors.length) {
        bits.push('page has <code>' + ev.similarSelectors.map(esc).join('</code> <code>') + '</code>');
      }
      if (ev.excerpt) bits.push('“' + esc(String(ev.excerpt).slice(0, 90)) + '”');
      const shot = ev.screenshot
        ? '<details class="shot"><summary>screenshot</summary><img loading="lazy" ' +
          'alt="the page when the step failed" src="/api/artifact?path=' +
          encodeURIComponent(ev.screenshot) + '" /></details>'
        : '';
      $('triage').insertAdjacentHTML('beforeend',
        '<div class="tri"><span class="verdict ' + esc(t.verdict) + '">' + esc(t.verdict) + '</span><div class="b">' +
          '<div class="who">' + esc(t.testCaseName || t.testCaseId) + '</div>' +
          '<div class="why">' + esc(t.reason) + '</div>' +
          (t.suggestion ? '<div class="fix">→ ' + esc(t.suggestion) + '</div>' : '') +
          (bits.length ? '<div class="ev">' + bits.join(' · ') + '</div>' : '') +
          shot +
          '<div class="meta' + (t.confidence === 'low' ? ' low' : '') + '">' +
            esc(t.confidence) + ' confidence · decided by ' + esc(t.source) + '</div>' +
          (t.verdict === 'test-bug' && t.confidence === 'high' && t.file
            ? '<div class="repair" data-file="' + esc(t.file) + '">' +
                '<button class="repair-btn">Fix &amp; verify</button>' +
                '<span class="outcome muted"></span></div>'
            : '') +
        '</div></div>');
      log('  [' + t.verdict + '] ' + (t.testCaseName || t.testCaseId));
    });

    src.addEventListener('triage:done', (e) => {
      const d = JSON.parse(e.data);
      $('triageTech').textContent = d.byRule + ' by rule · ' + d.byModel + ' by model';
      $('triageCounts').innerHTML = Object.entries(d.byVerdict)
        .sort((a, b) => b[1] - a[1])
        .map(([v, n]) => '<span class="verdict ' + esc(v) + '">' + esc(v) + ' · ' + n + '</span>')
        .join('');
      log('done.');
      finish();
    });

    src.addEventListener('error', (e) => {
      let msg = 'stream failed';
      try { if (e.data) msg = JSON.parse(e.data).message; } catch (_) {}
      log('error: ' + msg);
      setStatus('run failed', 'fail');
      finish();
    });
  });

  // ---------- repair ----------
  $('triage').addEventListener('click', async (e) => {
    const btn = e.target.closest('.repair-btn');
    if (!btn) return;
    const wrap = btn.closest('.repair');
    const file = wrap.dataset.file;
    const out = wrap.querySelector('.outcome');
    const apply = btn.dataset.apply === '1';

    btn.disabled = true;
    btn.textContent = apply ? 'Applying…' : 'Checking…';
    out.className = 'outcome muted';
    out.textContent = apply ? 'writing and re-running…' : 'proposing and verifying…';

    try {
      const r = await fetch('/api/repair', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ dir: testsDir(), configPath: cfgPath(), file, apply }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'failed');

      if (!d.repaired) {
        btn.remove();
        out.className = 'outcome muted';
        out.textContent = 'no fix — ' + esc(d.reason || 'declined');
        return;
      }
      if (d.written) {
        wrap.innerHTML = '<span class="outcome ok">✓ fixed and written: <code>' +
          esc(d.from) + '</code> → <code>' + esc(d.to) + '</code></span>';
      } else {
        // Verified but not yet written: offer the write as a second, explicit step.
        out.className = 'outcome ok';
        out.innerHTML = 'verified: <code>' + esc(d.from) + '</code> → <code>' + esc(d.to) +
          '</code> · <span class="muted">' + esc(d.rationale || '') + '</span>';
        btn.disabled = false;
        btn.textContent = 'Apply fix';
        btn.dataset.apply = '1';
      }
    } catch (err) {
      out.className = 'outcome err';
      out.textContent = esc(err.message);
      btn.disabled = false;
      btn.textContent = 'Fix & verify';
    }
  });

  // ---------- test-case editor ----------
  let editingFile = null;

  $('fileList').addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-file]');
    if (!btn || btn.disabled) return;
    const file = btn.dataset.file;
    try {
      const r = await fetch('/api/testcase?dir=' + encodeURIComponent(testsDir()) +
                            '&file=' + encodeURIComponent(file));
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'failed');
      editingFile = file;
      $('editorFile').textContent = file;
      $('editorText').value = data.content;
      $('editorStatus').textContent = '';
      show('editorPanel', true);
      $('editorPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } catch (err) {
      $('editorStatus').innerHTML = '<span class="err">' + esc(err.message) + '</span>';
    }
  });

  $('saveBtn').addEventListener('click', async () => {
    if (!editingFile) return;
    const status = $('editorStatus');
    status.innerHTML = '<span class="muted">saving…</span>';
    try {
      const r = await fetch('/api/testcase', {
        method: 'PUT',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ dir: testsDir(), file: editingFile, content: $('editorText').value }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'failed');
      status.innerHTML = '<span class="ok">saved and validated ✓</span>';
    } catch (err) {
      status.innerHTML = '<span class="err">' + esc(err.message) + '</span>';
    }
  });
</script>
</body>
</html>
