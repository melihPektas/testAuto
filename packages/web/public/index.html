<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test Orchestrator Dashboard</title>
  <style>
    :root {
      --bg: #0f1420; --card: #171d2b; --muted: #8b95a7; --text: #e6e9ef;
      --border: #263047; --accent: #5b8cff;
      --pass-bg: #123524; --pass-fg: #4ade80;
      --fail-bg: #3a1620; --fail-fg: #f87171;
      --flaky-bg: #3a2f12; --flaky-fg: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; justify-content: center; padding: 2rem 1rem;
    }
    .container { max-width: 860px; width: 100%; }
    h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.9rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    .fields { display: flex; gap: 1rem; flex-wrap: wrap; }
    .field { flex: 1; min-width: 220px; }
    input {
      width: 100%; padding: 0.5rem 0.65rem; border-radius: 8px;
      border: 1px solid var(--border); background: #0e1320; color: var(--text); font-size: 0.9rem;
    }
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    button {
      padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border);
      background: #1f273a; color: var(--text); font-size: 0.9rem; cursor: pointer;
    }
    button:hover:not(:disabled) { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #08122e; font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: default; }
    .chips { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .chip { background: #0e1320; border: 1px solid var(--border); border-radius: 999px; padding: 0.2rem 0.7rem; font-size: 0.8rem; }
    .chip b { color: var(--accent); }
    ul.tests { margin: 0.5rem 0 0; padding-left: 1.1rem; color: var(--muted); font-size: 0.9rem; }
    .badge { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.03em; }
    .badge.pass { background: var(--pass-bg); color: var(--pass-fg); }
    .badge.fail { background: var(--fail-bg); color: var(--fail-fg); }
    .badge.flaky { background: var(--flaky-bg); color: var(--flaky-fg); }
    .summary { font-weight: 600; margin-bottom: 0.75rem; }
    .result-row { display: flex; align-items: center; gap: 0.65rem; padding: 0.4rem 0; border-top: 1px solid var(--border); }
    .result-row .name { flex: 1; }
    .result-row .dur { color: var(--muted); font-size: 0.82rem; }
    .err { color: var(--fail-fg); font-size: 0.8rem; margin: 0.1rem 0 0.4rem 0.2rem; }
    #log {
      background: #080c14; border: 1px solid var(--border); border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.8rem;
      color: #9fe6b0; padding: 0.75rem; max-height: 240px; overflow-y: auto; white-space: pre-wrap;
    }
    .muted { color: var(--muted); }
    h2 { font-size: 0.95rem; margin: 0 0 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Test Orchestrator Dashboard</h1>
    <p class="sub">Browse test cases, run them, and watch results stream live.</p>

    <div class="card">
      <div class="fields">
        <div class="field">
          <label for="configPath">Config path</label>
          <input id="configPath" type="text" value="test-orchestrator.config.json" />
        </div>
        <div class="field">
          <label for="testsDir">Tests dir</label>
          <input id="testsDir" type="text" value="." />
        </div>
      </div>
      <div class="actions">
        <button id="loadConfigBtn">Load config</button>
        <button id="loadTestsBtn">Load tests</button>
        <button id="runBtn" class="primary">Run</button>
      </div>
      <div id="config"></div>
      <div id="tests"></div>
    </div>

    <div class="card" id="logCard" style="display:none">
      <h2>Live log</h2>
      <div id="log"></div>
    </div>

    <div class="card" id="resultsCard" style="display:none">
      <h2>Results</h2>
      <div id="results"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const cfgPath = () => $('configPath').value.trim();
    const testsDir = () => $('testsDir').value.trim();

    $('loadConfigBtn').addEventListener('click', async () => {
      const box = $('config');
      box.innerHTML = '<span class="muted">Loading…</span>';
      try {
        const res = await fetch(`/api/config?path=${encodeURIComponent(cfgPath())}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const cfg = await res.json();
        const chips = cfg.runners.map((r) => `<span class="chip"><b>${r.name}</b> · ${r.type}</span>`).join('');
        box.innerHTML = `<div style="margin-top:0.75rem"><span class="muted">Suite:</span> ${cfg.name}</div><div class="chips">${chips}</div>`;
      } catch (err) {
        box.innerHTML = `<div class="err">Error: ${err.message}</div>`;
      }
    });

    $('loadTestsBtn').addEventListener('click', async () => {
      const box = $('tests');
      box.innerHTML = '<span class="muted">Loading…</span>';
      try {
        const res = await fetch(`/api/tests?dir=${encodeURIComponent(testsDir())}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        box.innerHTML = data.files.length
          ? `<ul class="tests">${data.files.map((f) => `<li>${f}</li>`).join('')}</ul>`
          : '<div class="muted" style="margin-top:0.5rem">No test files found</div>';
      } catch (err) {
        box.innerHTML = `<div class="err">Error: ${err.message}</div>`;
      }
    });

    let source = null;

    $('runBtn').addEventListener('click', () => {
      const runBtn = $('runBtn');
      const log = $('log');
      const results = $('results');
      runBtn.disabled = true;
      runBtn.textContent = 'Running…';
      log.textContent = '';
      results.innerHTML = '';
      $('logCard').style.display = 'block';
      $('resultsCard').style.display = 'none';

      const append = (line) => {
        log.textContent += line + '\n';
        log.scrollTop = log.scrollHeight;
      };

      const finish = () => {
        if (source) { source.close(); source = null; }
        runBtn.disabled = false;
        runBtn.textContent = 'Run';
      };

      const url = `/api/run/stream?configPath=${encodeURIComponent(cfgPath())}&testsDir=${encodeURIComponent(testsDir())}`;
      source = new EventSource(url);

      source.addEventListener('progress', (e) => {
        const ev = JSON.parse(e.data);
        if (ev.type === 'test:end' && ev.result) {
          append(`  ↳ ${ev.result.testCaseName} — ${ev.result.status} (${ev.result.durationMs}ms)`);
        } else {
          append(ev.type);
        }
      });

      source.addEventListener('summary', (e) => {
        const s = JSON.parse(e.data);
        const label = s.status.toUpperCase();
        let html = `<div class="summary"><span class="badge ${s.status}">${label}</span> &nbsp; ${s.passed} passed, ${s.failed} failed, ${s.flaky} flaky (${s.durationMs}ms)</div>`;
        for (const r of s.results) {
          html += `<div class="result-row"><span class="badge ${r.status}">${r.status.toUpperCase()}</span><span class="name">${r.testCaseName}</span><span class="dur">${r.durationMs}ms</span></div>`;
          if (r.error && r.error.message) {
            html += `<div class="err">${r.error.message}</div>`;
          }
        }
        results.innerHTML = html;
        $('resultsCard').style.display = 'block';
        append('done.');
        finish();
      });

      source.addEventListener('error', (e) => {
        let msg = 'stream error';
        try { if (e.data) msg = JSON.parse(e.data).message; } catch (_) {}
        results.innerHTML = `<div class="err">Error: ${msg}</div>`;
        $('resultsCard').style.display = 'block';
        finish();
      });
    });
  </script>
</body>
</html>
