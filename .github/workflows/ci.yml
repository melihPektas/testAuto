name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Lint is not yet clean across the monorepo (typed-lint config + formatting
      # debt). Kept visible but non-blocking until a dedicated lint-cleanup pass.
      - name: Lint (non-blocking)
        continue-on-error: true
        run: pnpm lint

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run the CLI against generated test cases
        run: |
          set -e
          CLI="$PWD/packages/cli/bin/test-orchestrator.js"
          WORK="$(mktemp -d)"
          cd "$WORK"
          node "$CLI" init
          node "$CLI" generate smoke-a smoke-b -d cases
          node "$CLI" run -t cases --reporter junit --out results.xml
          echo "---- results.xml ----"
          cat results.xml
